name: Playwright Tests
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: lts/*
    - name: Install dependencies
      run: npm ci
    - name: Install Playwright Browsers
      run: npx playwright install --with-deps
    - name: Run Playwright tests
      env:
        BASE_URL: ${{ secrets.BASE_URL }}
        LOGIN_USERNAME: ${{ secrets.LOGIN_USERNAME }}
        LOGIN_PASSWORD: ${{ secrets.LOGIN_PASSWORD }}
        SECURITY_TEST_EMAIL: ${{ secrets.SECURITY_TEST_EMAIL }}
        SECURITY_TEST_PASSWORD: ${{ secrets.SECURITY_TEST_PASSWORD }}
        SECONDARY_ACCOUNT_EMAIL: ${{ secrets.SECONDARY_ACCOUNT_EMAIL }}
        SECONDARY_ACCOUNT_PASSWORD: ${{ secrets.SECONDARY_ACCOUNT_PASSWORD }}
      run: npx playwright test
    - uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 30
